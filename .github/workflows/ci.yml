name: CI - Docker Compose Build & Smoke Test

on:
  push:
    branches: [ main, master, ci-dev, building-feature ]
  pull_request:
    branches: [ main, master, ci-dev, building-feature ]

jobs:
  test-compose:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Build jars
        run: mvn -s .mvn/settings.xml -B clean package -DskipTests

      - name: Build Docker images
        run: docker compose -f docker-compose-dev.yaml build
        
      - name: Start services
        run: docker compose -f docker-compose-dev.yaml up -d

      - name: Wait for services
        run: sleep 40

      - name: Check running containers
        run: |
          CRITICAL="gateway auth-service problem-service submission-service judging-service kafka"
          for svc in $CRITICAL; do
            if ! docker ps --filter "name=$svc" --filter "status=running" | grep -q "$svc"; then
              echo "$svc not running"
              docker compose -f docker-compose-dev.yaml logs $svc
              exit 1
            fi
          done
          echo "All services up"

      - name: Stop containers
        if: always()
        run: docker compose -f docker-compose-dev.yaml down
