version: '3.8'
services:
  
  gateway:
    build: ./gateway
    container_name: gateway
    ports:
      - "8080:8080"
    environment:
      AUTH_SERVICE_URL: http://auth-service:8003
      PROBLEM_SERVICE_URL: http://problem-service:8000
      SERVER_PORT: 8080
    networks:
      - external
    depends_on:
      - auth-service

  auth-service:
    build: ./auth-service
    container_name: auth-service
    environment:
      SERVER_PORT: 8003
      JWT_SECRET: kalsdjflasfjdljflaskdjflkasjdflkajsdlfkjasldkfjlaskdjflkasdjf'
      JWT_EXP_MINUTES: 100
      SPRING_DATASOURCE_URL: jdbc:postgresql://db-auth-service:5432/postgres
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: root
    ports:
      - "8003:8003"
    networks:
      - external
    depends_on:
      - db-auth-service


  problem-service:
    build: ./problem-contest-service
    container_name: problem-service
    environment:
      SERVER_PORT: 8000
      KAFKA_BOOTSTRAP: kafka:9092
      SPRING_DATASOURCE_URL: jdbc:postgresql://db-problem-service:5432/postgres
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: root
      JUDGING_SERVICE_URL: http://judging-service:8002
      AUTH_SERVICE_URL: http://auth-service:8003
      REDIS_PORT: 6379
      REDIS_URL: redis-problem-service
    ports:
      - "8000:8000"
    networks:
      - external
    depends_on:
      - kafka
      - db-problem-service
      - redis-problem-service
    

  submission-service:
    build: ./submission-service
    container_name: submission-service
    environment:
      SERVER_PORT: 8001
      PROBLEM_SERVICE_URL: http://problem-service:8000
      KAFKA_BOOTSTRAP: kafka:9092
      SPRING_DATASOURCE_URL: jdbc:postgresql://db-submission-service:5432/postgres
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: root
      JUDGING_SERVICE_URL: http://judging-service:8002
      REDIS_PORT: 6379
      REDIS_URL: redis-submission-service
    ports:
      - "8001:8001"
    networks:
      - external
    depends_on:
      - kafka
      - db-submission-service
      - redis-submission-service

  judging-service:
    build: ./judging-service
    container_name: judging-service
    environment:
      SERVER_PORT: 8002
      KAFKA_BOOTSTRAP: kafka:9092
      SPRING_DATASOURCE_URL: jdbc:postgresql://db-judging-service:5432/postgres
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: root
      JUDGE_WORKDIR: /judge
    networks:
      - external
    depends_on:
      - kafka
      - db-judging-service
    ports:
      - "8002:8002"
    volumes:
      - /d/judge:/judge:rw


  kafka:
    image: apache/kafka:latest
    container_name: kafka
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
    ports:
      - "9092:9092"
    networks:
      - external


  db-problem-service:
    image: postgres
    restart: always
    environment:
      POSTGRES_PASSWORD: root
    networks:
      - external

  db-submission-service:
    image: postgres
    restart: always
    environment:
      POSTGRES_PASSWORD: root
    networks:
      - external


  db-judging-service:
    image: postgres
    restart: always
    environment:
      POSTGRES_PASSWORD: root
    networks:
      - external

  db-auth-service:
    image: postgres
    restart: always
    environment:
      POSTGRES_PASSWORD: root
    networks:
      - external



  adminer:
    image: adminer
    restart: always
    ports:
      - "8070:8080"
    networks:
      - external

  redis-submission-service:
    image: redis:8.4
    ports:
      - "6379:6379"
    networks:
      - external

  redis-problem-service:
    image: redis:8.4
    ports:
      - "6380:6379"
    networks:
      - external

networks:
  external:
    driver: bridge


