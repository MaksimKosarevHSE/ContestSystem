version: '3.8'
services:
  auth-service:
    build: ./auth-service
    container_name: auth-service
    environment:
      SERVER_PORT: 8003
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/postgres

  problem-service:
    build: ./problem-service
    container_name: problem-service
    environment:
      SERVER_PORT: 8000
      # ...

  submission-service:
    build: ./submission-service
    container_name: submission-service
    environment:
      SERVER_PORT: 8001
      PROBLEM_SERVICE_URL: http://problem-service:8000
      # ...

  gateway:
    build: ./gateway
    container_name: gateway
    ports:
      - "8080:8080"
    environment:
      AUTH_SERVICE_URL: http://auth-service:8003
      # ...