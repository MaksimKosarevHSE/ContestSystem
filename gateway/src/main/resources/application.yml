spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      routes:
        - id: auth-service
          uri: http://localhost:8003
          predicates:
            - Path=/api/auth/**
        - id: problem-contest-service
          uri: http://localhost:8000
          predicates:
            - Path=/api/contests/**
        #            - Path=api/contest/**, api/contests/**,api/problem/**,api/problems/**
        - id: submission-service
          uri: http://localhost:8001
          predicates:
            - Path=/api/submissions
        - id: judging-service
          uri: http://localhost:8002
          predicates:
            - Path=/api/judgements/**

server:
  port: 8080

auth:
  service:
    url: "localhost:8005"