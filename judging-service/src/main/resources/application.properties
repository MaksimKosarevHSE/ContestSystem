spring.application.name=testingService

server.port=${SERVER_PORT:8002}

spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP:localhost:9092}

spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:root}
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://db:5432/postgres}



consumer.group_id=judging_service
test.case.judged.event.topic=submission-jugding-progress-event-topic

judging.workdir=${JUDGE_WORKDIR:/judge}
judging.tests.dir=${judging.workdir}/tests
judging.sessions.dir=${judging.workdir}/sessions


spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JacksonJsonSerializer

#spring.kafka.producer.transaction-id-prefix=judging-service-${random.value}

spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=true
#spring.jpa.hibernate.ddl-auto=update

logging.level.com.maksim.testingService=DEBUG


spring.liquibase.enabled=true
spring.liquibase.change-log=classpath:/db/db.changelog-master.xml



