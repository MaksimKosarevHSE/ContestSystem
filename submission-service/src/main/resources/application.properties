spring.application.name=submission-service

server.port=${SERVER_PORT:8001}

spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP:localhost:9092}

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/postgres}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:root}

problem.service.url=${PROBLEM_SERVICE_URL:http://localhost:8000}

spring.data.redis.host=${REDIS_URL:localhost}
spring.data.redis.port=${REDIS_PORT:6379}

solution.submitted.event.topic=solution-submitted-event-topic
solution.judged.event.topic=submission-judging-progress-event-topic
standings.update.event.topic=standings-update-event-topic

consumer.group_id=submission-service

spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JacksonJsonSerializer
spring.kafka.producer.properties.spring.json.add.type.headers=false

spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=true

springdoc.api-docs.path=/api-docs

spring.liquibase.enabled=true
spring.liquibase.change-log=classpath:/db/db.changelog-master.xml